management.endpoints.web.base-path=/actuator

# Swagger
springdoc.swagger-ui.path=/api/docs
springdoc.api-docs.path=/api/docs/openapi

# RabbitMQ
spring.rabbitmq.host=jaragua.lmq.cloudamqp.com
spring.rabbitmq.port=5672
spring.rabbitmq.username=ygyqwayx
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=ygyqwayx
management.health.rabbit.enabled=false
management.health.mail.enabled=false

# Nomes das filas e exchange (centralizados aqui para n„o ficarem hardcoded)
