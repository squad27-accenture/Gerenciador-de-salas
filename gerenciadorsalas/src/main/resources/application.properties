spring.application.name=gerenciadorsalas

# H2 e DBeaver(um banco feito para testes) em memória usado apenas para testes (dados somem ao reiniciar)
spring.datasource.url=jdbc:h2:file:./salasteste;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update


